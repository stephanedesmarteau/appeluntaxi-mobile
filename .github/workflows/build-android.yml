name: "🚀 Build Android AAB"

# Se déclenche automatiquement sur push, ou manuellement
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app:
        description: "Quelle app compiler?"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - chauffeur
          - client
      version_name:
        description: "Version (ex: 1.0.1)"
        required: false
        default: ""
      version_code:
        description: "Code de version (ex: 2)"
        required: false
        default: ""

jobs:
  # ─────────────────────────────────────────
  # BUILD APP CHAUFFEUR
  # ─────────────────────────────────────────
  build-chauffeur:
    name: "🚕 Build Chauffeur AAB"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.app == 'both' ||
      github.event.inputs.app == 'chauffeur'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances npm (chauffeur)
        working-directory: chauffeur
        run: npm ci --legacy-peer-deps

      - name: Synchroniser Capacitor avec Android
        working-directory: chauffeur
        run: npx cap sync android

      - name: Configurer le SDK Android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > chauffeur/android/local.properties

      - name: Mettre à jour le versionCode et versionName si spécifiés
        if: github.event.inputs.version_code != '' || github.event.inputs.version_name != ''
        working-directory: chauffeur/android/app
        run: |
          if [ -n "${{ github.event.inputs.version_code }}" ]; then
            sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" build.gradle
            echo "✅ versionCode → ${{ github.event.inputs.version_code }}"
          fi
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"${{ github.event.inputs.version_name }}\"/" build.gradle
            echo "✅ versionName → ${{ github.event.inputs.version_name }}"
          fi

      - name: Décoder le keystore Chauffeur
        env:
          KEYSTORE_BASE64: ${{ secrets.CHAUFFEUR_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > chauffeur/android/app/release.keystore

      - name: Compiler l'AAB Release (chauffeur)
        working-directory: chauffeur/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.CHAUFFEUR_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CHAUFFEUR_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CHAUFFEUR_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      - name: Copier l'AAB avec un nom clair
        run: |
          VERSION_NAME=$(grep versionName chauffeur/android/app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep versionCode chauffeur/android/app/build.gradle | grep -oP '\d+' | tail -1)
          mkdir -p artifacts
          cp chauffeur/android/app/build/outputs/bundle/release/app-release.aab \
             "artifacts/appeluntaxi-chauffeur-v${VERSION_NAME}-${VERSION_CODE}.aab"
          echo "✅ AAB Chauffeur: appeluntaxi-chauffeur-v${VERSION_NAME}-${VERSION_CODE}.aab"

      - name: Téléverser l'AAB Chauffeur
        uses: actions/upload-artifact@v4
        with:
          name: aab-chauffeur
          path: artifacts/appeluntaxi-chauffeur-*.aab
          retention-days: 30

  # ─────────────────────────────────────────
  # BUILD APP CLIENT
  # ─────────────────────────────────────────
  build-client:
    name: "📱 Build Client AAB"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.app == 'both' ||
      github.event.inputs.app == 'client'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances npm (client)
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Synchroniser Capacitor avec Android
        working-directory: client
        run: npx cap sync android

      - name: Configurer le SDK Android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > client/android/local.properties

      - name: Mettre à jour le versionCode et versionName si spécifiés
        if: github.event.inputs.version_code != '' || github.event.inputs.version_name != ''
        working-directory: client/android/app
        run: |
          if [ -n "${{ github.event.inputs.version_code }}" ]; then
            sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" build.gradle
            echo "✅ versionCode → ${{ github.event.inputs.version_code }}"
          fi
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            sed -i "s/versionName \"[^\"]*\"/versionName \"${{ inputs.version_name }}\"/" build.gradle
            echo "✅ versionName → ${{ github.event.inputs.version_name }}"
          fi

      - name: Décoder le keystore Client
        env:
          KEYSTORE_BASE64: ${{ secrets.CLIENT_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > client/android/app/release.keystore

      - name: Compiler l'AAB Release (client)
        working-directory: client/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.CLIENT_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CLIENT_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CLIENT_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon

      - name: Copier l'AAB avec un nom clair
        run: |
          VERSION_NAME=$(grep versionName client/android/app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep versionCode client/android/app/build.gradle | grep -oP '\d+' | tail -1)
          mkdir -p artifacts
          cp client/android/app/build/outputs/bundle/release/app-release.aab \
             "artifacts/appeluntaxi-client-v${VERSION_NAME}-${VERSION_CODE}.aab"
          echo "✅ AAB Client: appeluntaxi-client-v${VERSION_NAME}-${VERSION_CODE}.aab"

      - name: Téléverser l'AAB Client
        uses: actions/upload-artifact@v4
        with:
          name: aab-client
          path: artifacts/appeluntaxi-client-*.aab
          retention-days: 30
