name: "🔑 Générer les Keystores (1 fois seulement)"

# À exécuter UNE SEULE FOIS pour créer les keystores de signature
# Ensuite, enregistrer les valeurs comme secrets GitHub

on:
  workflow_dispatch:
    inputs:
      company:
        description: "Nom de l'organisation (ex: AppelUnTaxi)"
        required: true
        default: "AppelUnTaxi"
      city:
        description: "Ville / Province (ex: Quebec)"
        required: true
        default: "Quebec"

jobs:
  generate-keystores:
    name: Générer les 2 keystores
    runs-on: ubuntu-latest

    steps:
      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Générer le keystore CHAUFFEUR
        run: |
          keytool -genkeypair \
            -v \
            -keystore chauffeur-release.keystore \
            -alias appeluntaxi-chauffeur \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.run_id }}CHAUFFEUR" \
            -keypass "${{ github.run_id }}CHAUFFEUR" \
            -dname "CN=${{ inputs.company }} Chauffeur, OU=Mobile, O=${{ inputs.company }}, L=${{ inputs.city }}, ST=Quebec, C=CA"

      - name: Générer le keystore CLIENT
        run: |
          keytool -genkeypair \
            -v \
            -keystore client-release.keystore \
            -alias appeluntaxi-client \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.run_id }}CLIENT" \
            -keypass "${{ github.run_id }}CLIENT" \
            -dname "CN=${{ inputs.company }} Client, OU=Mobile, O=${{ inputs.company }}, L=${{ inputs.city }}, ST=Quebec, C=CA"

      - name: Encoder en Base64 et afficher les valeurs des secrets
        run: |
          echo "========================================="
          echo "COPIER CES VALEURS DANS LES SECRETS GITHUB"
          echo "========================================="
          echo ""
          echo "--- SECRET: CHAUFFEUR_KEYSTORE_BASE64 ---"
          base64 -w 0 chauffeur-release.keystore
          echo ""
          echo ""
          echo "--- SECRET: CHAUFFEUR_KEYSTORE_PASSWORD ---"
          echo "${{ github.run_id }}CHAUFFEUR"
          echo ""
          echo "--- SECRET: CHAUFFEUR_KEY_ALIAS ---"
          echo "appeluntaxi-chauffeur"
          echo ""
          echo "--- SECRET: CHAUFFEUR_KEY_PASSWORD ---"
          echo "${{ github.run_id }}CHAUFFEUR"
          echo ""
          echo "========================================="
          echo ""
          echo "--- SECRET: CLIENT_KEYSTORE_BASE64 ---"
          base64 -w 0 client-release.keystore
          echo ""
          echo ""
          echo "--- SECRET: CLIENT_KEYSTORE_PASSWORD ---"
          echo "${{ github.run_id }}CLIENT"
          echo ""
          echo "--- SECRET: CLIENT_KEY_ALIAS ---"
          echo "appeluntaxi-client"
          echo ""
          echo "--- SECRET: CLIENT_KEY_PASSWORD ---"
          echo "${{ github.run_id }}CLIENT"
          echo ""
          echo "========================================="

      - name: Sauvegarder les fichiers keystore comme artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keystores-backup
          path: |
            chauffeur-release.keystore
            client-release.keystore
          retention-days: 1
